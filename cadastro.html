<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <div class="container">
            <div class="left">
                <div id="content_cadastro">
                    <form action="php/salvar.php" method="POST">
                        
                        <h2 id="title_2">Cadastro</h2>
                        <div class="grid">
                            <div class="input-group full">
                                <label for="nome" class="label">Nome</label>
                                <input type="text" name="nome" required>
                            </div>
                            <div class="input-group">
                                <label for="cpf" class="label">CPF</label>
                                <input type="text" name="cpf" required>
                            </div>
                            <div class="input-group">
                                <label for="senha" class="label">Senha</label>
                                <input type="password" name="senha" required>
                            </div>
                        </div>

                        <h2 id="title_2">Local de Moradia</h2>
                        <div class="grid">
                            <div class="input-group full">
                                <label class="label">Rua</label>
                                <input type="text" name="rua">
                            </div>

                            <div class="input-group">
                                <label class="label">Número</label>
                                <input type="number" name="numero">
                            </div>

                            <div class="input-group">
                                <label class="label">Complemento</label>
                                <input type="text" name="complemento">
                            </div>

                            <div class="input-group">
                                <label class="label">CEP</label>
                                <input type="text" name="cep">
                            </div>

                            <div class="input-group">
                                <label class="label">Bai rro</label>
                                <input type="text" name="bairro">
                            </div>

                            <div class="input-group">
                                <label class="label">UF</label>
                                <input type="text" name="uf">
                            </div>
                        </div>

                        <button type="submit" class="login-btn">Cadastrar</button>
                    </form>
                </div>
            </div>

            <div class="right_login">
                <a href="landing.html"><img src="img/logo.png" alt="Ícone" class="icon"></a>
                <img src="img/download.gif" alt="Imagem" class="main-img">
            </div>

        </div>

    </body>
</html>
